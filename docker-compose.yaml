services:
  mysql:
    image: mysql:latest
    network_mode: "host"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=nexus
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always

  redis:
    image: redis:latest
    network_mode: "host"
    volumes:
      - redis_data:/data
    restart: always

  nats:
    image: nats:latest
    network_mode: "host"
    restart: always

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["migrate", "up"]
    network_mode: "host"
    environment:
      - APP_ENV=development
    depends_on:
      - mysql
    restart: "no"

  nexus-http:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["http"]
    network_mode: "host"
    environment:
      - APP_ENV=development
      - HTTP_PORT=8080
    depends_on:
      - migrate
      - redis
      - nats
    restart: always

  nexus-ws:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["ws"]
    network_mode: "host"
    environment:
      - APP_ENV=development
      - WS_PORT=8081
    depends_on:
      - migrate
      - redis
      - nats
    restart: always

  nexus-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["worker"]
    network_mode: "host"
    environment:
      - APP_ENV=development
    depends_on:
      - migrate
      - redis
      - nats
    restart: always

volumes:
  redis_data:
  mysql_data:
