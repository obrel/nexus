  /v1/history:
    get:
      tags: [History]
      summary: Get message history
      description: |
        Fetches message history for a group or private conversation. Returns messages
        with ID greater than `since_id`, ordered by ID ascending, up to `limit` messages.
        Use `group_id` for group history or `user_id` for private conversation history.
        Exactly one must be provided. For group history, the user must be a member.
      operationId: getHistory
      security:
        - BearerAuth: []
      parameters:
        - name: group_id
          in: query
          required: false
          description: Group ID to fetch history for (mutually exclusive with user_id)
          schema:
            type: string
          example: "nexus_dev_team"
        - name: user_id
          in: query
          required: false
          description: User ID to fetch private conversation history with (mutually exclusive with group_id)
          schema:
            type: string
          example: "420158066212864"
        - name: since_id
          in: query
          required: false
          description: Return only messages with ID greater than this value (cursor-based pagination)
          schema:
            type: integer
            format: uint64
            default: 0
          example: 420158066278400
        - name: limit
          in: query
          required: false
          description: Maximum number of messages to return (1-100, default 25)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
          example: 25
      responses:
        "200":
          description: Message history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      messages:
                        type: array
                        items:
                          $ref: "#/components/schemas/Message"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                group_id_or_user_id_required:
                  value: { "success": false, "message": "group_id_or_user_id_required" }
                invalid_limit:
                  value: { "success": false, "message": "invalid_limit" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a member of the group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "not_a_group_member" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "history_failed" }
