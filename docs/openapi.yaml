          application/json:
            schema:
              type: object
              required: [group_id, name]
              properties:
                group_id:
                  type: string
                  description: Unique identifier for the new group
                  example: "nexus_dev_team"
                name:
                  type: string
                  description: Display name for the group
                  example: "Nexus Dev Team"
                description:
                  type: string
                  description: Optional group description
                  example: "Main development channel"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      group_id:
                        type: string
                        example: "nexus_dev_team"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                group_id_required:
                  value: { "success": false, "message": "group_id_required" }
                name_required:
                  value: { "success": false, "message": "name_required" }
        "401":
          description: Unauthorized
          content:
