openapi: "3.0.3"
info:
  title: Nexus Messaging API
  description: |
    Nexus is a high-concurrency WebSocket messaging service with a CQRS-inspired architecture.

    **Architecture Overview:**
    - **Ingress Tier** (this API): Stateless HTTP endpoints for sending messages, managing groups, user profiles, and authentication.
    - **Egress Tier**: Stateful WebSocket connections for real-time event delivery (MSG_NEW, MSG_UPDATED, MSG_STATUS, USR_JOINED, USR_LEFT, TYP_INDICATOR).
    - **NATS Cluster**: Internal message bus connecting Ingress and Egress tiers.

    **Authentication:**
    All protected endpoints require a JWT token. Nexus does not provide registration or login flows —
    developers implement their own auth service and use the internal API to sync users into Nexus.
    Pass the token in the `Authorization: Bearer <token>` header.
  version: "1.0.0"
  contact:
    name: Nexus Team

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Operational
    description: Health, readiness, and metrics endpoints
  - name: Auth
    description: Internal user registration and JWT issuance
  - name: Messages
    description: Message lifecycle — send, edit, delete, acknowledge
  - name: Groups
    description: Group management and membership
  - name: Profile
    description: User profile management
  - name: History
    description: Message history sync

components:
  parameters:
    XInternalKey:
      in: header
      name: X-Internal-Key
      required: true
      schema:
        type: string
      description: Internal API key configured via `http.internal_api_key`
    XAppID:
      in: header
      name: X-App-ID
      required: true
      schema:
        type: string
      description: Tenant/app ID
      example: "myapp"

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT token with claims:
        - `sub` (string): user ID
        - `tid` (string): tenant/app ID
        - `iat` (int): issued at
        - `exp` (int): expiration (24h from issue)

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
      required:
        - success
        - data

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          description: Machine-readable error code
      required:
        - success
        - message

    Message:
      type: object
      properties:
        id:
          type: integer
          format: uint64
          description: Snowflake message ID
          example: 420158066278400
        app_id:
          type: string
          example: "myapp"
        recipient_type:
          type: string
          enum: [group, user]
          description: "Type of recipient: 'group' for group messages, 'user' for private messages"
          example: "group"
        recipient_id:
          type: string
          description: Target identifier (group ID when recipient_type is group, user ID when user)
          example: "nexus_dev_team"
        shard_id:
          type: integer
          example: 42
        content:
          type: object
          description: Structured message content (JSON)
          example: { "type": "text", "text": "Hello, world!" }
        sender_type:
          type: string
          enum: [user]
          description: "Type of sender (currently only 'user')"
          example: "user"
        sender_id:
          type: string
          description: Sender identifier (user ID when sender_type is user)
          example: "420158066212864"
        created_at:
          type: string
          format: date-time
          example: "2026-03-24T10:30:00Z"

    UserProfile:
      type: object
      properties:
        user_id:
          type: string
          example: "420158066212864"
        app_id:
          type: string
          example: "myapp"
        email:
          type: string
          example: "user@example.com"
        name:
          type: string
          example: "John Doe"
        bio:
          type: string
          example: "Software engineer"
        private_topic:
          type: string
          description: NATS subject for private messages
          example: "nexus.myapp.v1.user.420158066212864"
        created_at:
          type: string
          format: date-time

    GroupDetail:
      type: object
      properties:
        group_id:
          type: string
          example: "nexus_dev_team"
        name:
          type: string
          example: "Nexus Dev Team"
        description:
          type: string
          example: "Main development channel"
        created_by:
          type: string
          description: User ID of the group creator
          example: "420158066212864"
        created_at:
          type: string
          format: date-time
          example: "2026-03-24T10:00:00Z"

paths:
  /health:
    get:
      tags: [Operational]
      summary: Liveness check
      description: Returns 200 if the process is alive. No dependency checks.
      operationId: health
      responses:
        "200":
          description: Process is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /ready:
    get:
      tags: [Operational]
      summary: Readiness check
      description: |
        Returns 200 only if all critical dependencies (MySQL, Redis, NATS) are reachable.
        Returns 503 if any dependency is unavailable.
      operationId: ready
      responses:
        "200":
          description: All dependencies are healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ready"
                  checks:
                    type: object
                    properties:
                      mysql:
                        type: string
                        example: "ok"
                      redis:
                        type: string
                        example: "ok"
                      nats:
                        type: string
                        example: "ok"
        "503":
          description: One or more dependencies are unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "not_ready"
                  checks:
                    type: object

  /metrics:
    get:
      tags: [Operational]
      summary: Prometheus metrics
      description: Exposes Prometheus-format metrics for monitoring.
      operationId: metrics
      responses:
        "200":
          description: Prometheus metrics in text format
          content:
            text/plain:
              schema:
                type: string

  /internal/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register or retrieve a user (internal)
      description: |
        Service-to-service endpoint for syncing users from an external auth service into Nexus.
        Creates the user if they don't exist, or retrieves them if they do, and returns a JWT.
        Authenticated via `X-Internal-Key` header.

        > All `/internal/*` endpoints are only registered when **both** `http.internal_routes: true`
        > and `http.internal_api_key` are set in the server configuration.
      operationId: registerUser
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  example: "user@example.com"
                name:
                  type: string
                  description: Display name (optional, set on newly created users)
                  example: "John Doe"
      responses:
        "200":
          description: User registered or retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: JWT token (valid for 24 hours)
                        example: "eyJhbGciOiJIUzI1NiIs..."
                      user_id:
                        type: string
                        example: "420158066212864"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_json:
                  value: { "success": false, "message": "invalid_json" }
                email_required:
                  value: { "success": false, "message": "email_required" }
        "401":
          description: Invalid or missing internal API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "invalid_internal_key" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "register_failed" }

  /internal/v1/messages/send:
    post:
      tags: [Auth]
      summary: Send a message (internal)
      description: |
        Service-to-service endpoint for sending a message on behalf of a user.
        Intended for external services that receive a message from a client and
        need to deliver it through Nexus without holding a JWT token themselves.
        Authenticated via `X-Internal-Key` header. The `sender_id` field must
        be a valid Nexus user ID. Group membership rules apply as normal —
        the sender must be a member of the target group for group messages.
        `group_id` and `user_id` are mutually exclusive — exactly one must be provided.
      operationId: internalSendMessage
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_id, content]
              properties:
                sender_id:
                  type: string
                  description: Nexus user ID of the message sender
                  example: "420158066212864"
                group_id:
                  type: string
                  description: Target group ID (mutually exclusive with user_id)
                  example: "nexus_dev_team"
                user_id:
                  type: string
                  description: Target user ID for private message (mutually exclusive with group_id)
                  example: "420158066278401"
                content:
                  type: object
                  description: Structured message content (JSON object)
                  example: { "type": "text", "text": "Hello from external service!" }
      responses:
        "202":
          description: Message accepted for delivery
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        description: Snowflake message ID
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                sender_id_required:
                  value: { "success": false, "message": "sender_id_required" }
                group_id_or_user_id_required:
                  value: { "success": false, "message": "group_id_or_user_id_required" }
                mutually_exclusive:
                  value: { "success": false, "message": "group_id_and_user_id_are_mutually_exclusive" }
                content_required:
                  value: { "success": false, "message": "content_required" }
                cannot_message_self:
                  value: { "success": false, "message": "cannot_message_self" }
        "401":
          description: Invalid or missing internal API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "invalid_internal_key" }
        "403":
          description: Sender is not a member of the target group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "not_a_member" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "send_failed" }

  /internal/v1/messages/edit:
    post:
      tags: [Auth]
      summary: Edit a message (internal)
      description: |
        Service-to-service endpoint for editing a message on behalf of its sender.
        Only the original sender (`sender_id`) may edit the message.
        Authenticated via `X-Internal-Key` header.
      operationId: internalEditMessage
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_id, message_id, content]
              properties:
                sender_id:
                  type: string
                  description: Nexus user ID of the original message sender
                  example: "420158066212864"
                message_id:
                  type: string
                  description: Snowflake ID of the message to edit
                  example: "420158066278400"
                content:
                  type: object
                  description: Updated message content (JSON object)
                  example: { "type": "text", "text": "Updated content" }
      responses:
        "200":
          description: Message edited
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing internal API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "edit_failed" }

  /internal/v1/messages/delete:
    post:
      tags: [Auth]
      summary: Delete a message (internal)
      description: |
        Service-to-service endpoint for soft-deleting a message on behalf of its sender.
        Only the original sender (`sender_id`) may delete the message.
        Authenticated via `X-Internal-Key` header.
      operationId: internalDeleteMessage
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sender_id, message_id]
              properties:
                sender_id:
                  type: string
                  description: Nexus user ID of the original message sender
                  example: "420158066212864"
                message_id:
                  type: string
                  description: Snowflake ID of the message to delete
                  example: "420158066278400"
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid or missing internal API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "delete_failed" }

  /internal/v1/messages/ack:
    post:
      tags: [Auth]
      summary: Acknowledge a message (internal)
      description: |
        Service-to-service endpoint for recording a message delivery status on behalf of a user.
        Valid statuses are `received` and `read`.
        Authenticated via `X-Internal-Key` header.
      operationId: internalAckMessage
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, message_id, status]
              properties:
                user_id:
                  type: string
                  description: Nexus user ID of the acknowledging user
                  example: "420158066278401"
                message_id:
                  type: string
                  description: Snowflake ID of the message to acknowledge
                  example: "420158066278400"
                status:
                  type: string
                  enum: [received, read]
                  example: "read"
      responses:
        "200":
          description: Acknowledgement recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_status:
                  value: { "success": false, "message": "invalid_status" }
        "401":
          description: Invalid or missing internal API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "ack_failed" }

  /v1/messages/send:
    post:
      tags: [Messages]
      summary: Send a message
      description: |
        Sends a message to a group or a specific user. The message is persisted with a
        Snowflake ID and queued via the transactional outbox for delivery through NATS.
        For group messages, the sender must be a member of the target group.
        `group_id` and `user_id` are mutually exclusive — exactly one must be provided.
      operationId: sendMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                group_id:
                  type: string
                  description: Target group ID (mutually exclusive with user_id)
                  example: "nexus_dev_team"
                user_id:
                  type: string
                  description: Target user ID for private message (mutually exclusive with group_id)
                  example: "420158066212864"
                content:
                  type: object
                  description: Structured message content (JSON object)
                  example: { "type": "text", "text": "Hello everyone!" }
      responses:
        "202":
          description: Message accepted for delivery
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        description: Snowflake message ID
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                group_id_or_user_id_required:
                  value: { "success": false, "message": "group_id_or_user_id_required" }
                mutually_exclusive:
                  value: { "success": false, "message": "group_id_and_user_id_are_mutually_exclusive" }
                content_required:
                  value: { "success": false, "message": "content_required" }
                cannot_message_self:
                  value: { "success": false, "message": "cannot_message_self" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Not a member of the target group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "not_a_member" }
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "send_failed" }

  /v1/messages/edit:
    post:
      tags: [Messages]
      summary: Edit a message
      description: |
        Edits the content of an existing message. Only the original sender can
        edit their message. A MSG_UPDATED event is broadcast to all group members.
      operationId: editMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_id, content]
              properties:
                message_id:
                  type: string
                  description: Snowflake ID of the message to edit
                  example: "420158066278400"
                content:
                  type: object
                  description: Updated message content (JSON object)
                  example: { "type": "text", "text": "Hello everyone! (edited)" }
      responses:
        "200":
          description: Message edited
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "edit_failed" }

  /v1/messages/delete:
    post:
      tags: [Messages]
      summary: Delete a message
      description: |
        Soft-deletes a message. Only the original sender can delete their message.
        A MSG_UPDATED event is broadcast to notify group members.
      operationId: deleteMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_id]
              properties:
                message_id:
                  type: string
                  description: Snowflake ID of the message to delete
                  example: "420158066278400"
      responses:
        "200":
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      message_id:
                        type: string
                        example: "420158066278400"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "delete_failed" }

  /v1/messages/ack:
    post:
      tags: [Messages]
      summary: Acknowledge a message
      description: |
        Updates the delivery status of a message for the authenticated user.
        Valid statuses are `received` (delivered to device) and `read` (user has read it).
        A MSG_STATUS event is sent to the message sender via the transactional outbox.
      operationId: ackMessage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message_id, status]
              properties:
                message_id:
                  type: string
                  description: Snowflake ID of the message to acknowledge
                  example: "420158066278400"
                status:
                  type: string
                  enum: [received, read]
                  description: Delivery status
                  example: "read"
      responses:
        "200":
          description: Acknowledgement recorded
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                invalid_status:
                  value: { "success": false, "message": "invalid_status" }
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                { "success": false, "message": "ack_failed" }

  /internal/v1/groups/create:
    post:
      tags: [Auth]
      summary: Create a group (internal)
      description: |
        Service-to-service endpoint for creating a group on behalf of a user.
        The `user_id` is recorded as the group creator and is automatically added as a member.
        Authenticated via `X-Internal-Key` header.
      operationId: internalCreateGroup
      parameters:
        - $ref: "#/components/parameters/XInternalKey"
        - $ref: "#/components/parameters/XAppID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id, group_id, name]
              properties:
                user_id:
                  type: string
                  description: Nexus user ID of the group creator
                  example: "420158066212864"
                group_id:
                  type: string
                  example: "nexus_dev_team"
                name:
                  type: string
                  example: "Nexus Dev Team"
                description:
                  type: string
                  example: "Main development channel"
      responses:
        "201":
          description: Group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      group_id:
                        type: string
