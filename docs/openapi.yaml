      description: |
        Creates a new group with a name, optional description, and a shard ID
        computed via the consistent hash ring. The `created_by` field is set to
        the authenticated user. The creator is automatically added as a member.
        Returns 409 if the group already exists.
      operationId: createGroup
      security:
        - BearerAuth: []
      requestBody:
        required: true
